<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | damr Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header class="header">
        <div class="container nav-wrapper">
            <div class="logo">
                <span>damr</span>
            </div>
            <nav class="navbar">
                <a href="../index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="#" class="active">Contact</a>
            </nav>
            <div class="nav-actions">
                <div class="cart-trigger">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-badge" id="item-count-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="contact-page">
        <div class="container">
            <div class="contact-container">
                <div class="contact-info-panel">
                    <h2>Get in Touch</h2>
                    <p>Have questions about our roasts or want to host an event? We'd love to hear from you.</p>
                    
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h4>Location</h4>
                            <p>123 Espresso Lane, Coffee City</p>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h4>Email</h4>
                            <p>hello@damrcoffee.com</p>
                        </div>
                    </div>

                    <div class="socials">
                        <a href="#" class="ig"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="fb"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="tw"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>

                <div class="contact-form-panel">
                    <form id="contactForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea rows="5" placeholder="How can we help?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div class="copyright">
        &copy; 2026 damr Coffee Roasters. All rights reserved.
    </div>

    <script>
        // Simple form handling
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Thanks for reaching out! The damr team will get back to you soon.");
            e.target.reset();
        });
    </script>
</body>
</html>
